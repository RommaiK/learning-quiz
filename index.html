<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ถอดรหัส Learning DNA</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Itim', cursive; color: #411900; }
  body { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; background: #fdfaf7; }
  .page { width: 100%; max-width: 560px; }

  /* COVER */
  .cover-img { width: 100%; border-radius: 16px; display: block; margin-bottom: 1.25rem; }
  .cover-desc { font-size: 15px; line-height: 1.85; color: #411900; text-align: center; margin-bottom: 1.5rem; }

  /* BANNER */
  .banner-img { width: 100%; display: block; margin-bottom: 0.5rem; border-radius: 12px; }

  /* PROGRESS */
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .progress-bar { flex: 1; height: 6px; background: #ede8e3; border-radius: 3px; }
  .progress-fill { height: 100%; background: #ABDEE6; border-radius: 3px; transition: width 0.3s ease; }
  .progress-label { font-size: 13px; color: #411900; white-space: nowrap; }

  /* QUESTION */
  .q-text { font-size: 18px; color: #411900; margin-bottom: 1.25rem; line-height: 1.8; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn { background: #fff; border: 1.5px solid #ede8e3; border-radius: 14px; padding: 14px 18px; text-align: left; cursor: pointer; font-family: 'Itim', cursive; font-size: 15px; color: #411900; transition: border-color 0.15s, background 0.15s; line-height: 1.7; }
  .choice-btn:hover { background: #fdf8f5; border-color: #ABDEE6; }
  .choice-btn.selected { border: 2px solid #ABDEE6; background: #f0f9fb; }

  /* NAV BUTTONS */
  .nav-row { display: flex; justify-content: space-between; margin-top: 1.5rem; gap: 10px; }
  .back-btn { background: transparent; border: 1.5px solid #ede8e3; border-radius: 20px; padding: 11px 24px; font-family: 'Itim', cursive; font-size: 15px; cursor: pointer; color: #411900; transition: background 0.15s; }
  .back-btn:hover { background: #f5ede4; }
  .back-btn:disabled { opacity: 0.3; cursor: default; }
  .next-btn, .start-btn { background: #ABDEE6; color: #FFFFFF; border: none; border-radius: 20px; padding: 11px 30px; font-family: 'Itim', cursive; font-size: 15px; cursor: pointer; opacity: 0.4; pointer-events: none; transition: opacity 0.2s, background 0.2s; }
  .next-btn.active, .start-btn { opacity: 1; pointer-events: auto; }
  .next-btn.active:hover, .start-btn:hover { background: #8ecfda; }
  .start-btn { opacity: 1; pointer-events: auto; display: block; margin: 0 auto; padding: 13px 40px; font-size: 17px; }

  /* RESULT */
  .result-page { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; transition: background 0.3s; }
  .result-inner { width: 100%; max-width: 560px; text-align: center; }
  .r-label { font-size: 13px; color: #411900; margin-bottom: 0.5rem; opacity: 0.7; }
  .r-img { width: 400px; height: 400px; object-fit: contain; margin: 0 auto 0.25rem; display: block; border-radius: 50%; padding: 4px; max-width: 100%; }
  .r-name { font-size: 26px; font-weight: 500; color: #411900; margin-bottom: 4px; }
  .r-eng { font-size: 15px; color: #411900; margin-bottom: 1.25rem; opacity: 0.75; }
  .r-desc { font-size: 15px; color: #411900; line-height: 1.85; margin-bottom: 1.25rem; text-align: left; background: rgba(255,255,255,0.55); border-radius: 14px; padding: 1rem 1.25rem; }
  .r-traits { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
  .trait { font-size: 13px; padding: 5px 16px; border-radius: 20px; background: rgba(255,255,255,0.7); color: #411900; }
  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .retry-btn { background: transparent; border: 1.5px solid #411900; border-radius: 20px; padding: 11px 28px; font-family: 'Itim', cursive; font-size: 15px; cursor: pointer; color: #411900; transition: background 0.15s; }
  .retry-btn:hover { background: rgba(255,255,255,0.4); }
  .save-btn { background: #ABDEE6; color: #FFFFFF; border: none; border-radius: 20px; padding: 11px 28px; font-family: 'Itim', cursive; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  .save-btn:hover { background: #8ecfda; }
</style>
</head>
<body>

<!-- COVER PAGE -->
<div class="page" id="cover-section">
  <img class="cover-img" src="Cover.png" alt="cover">
  <p class="cover-desc">
    แบบทดสอบ DNA การเรียนรู้ของตัวคุณ<br>
    ที่จะพาไปค้นหาว่า คุณมี DNA การเรียนรู้เหมือนสัตว์ชนิดไหน<br>
    ทำมาให้เล่นกันสนุก ๆ ตอบได้เลยไม่มีผิด ไม่มีถูกนะคะ ☺️<br><br>
    โดย ทีม Learning and Development, TED
  </p>
  <button class="start-btn" onclick="startQuiz()">เริ่มเล่น</button>
</div>

<!-- QUIZ PAGE -->
<div class="page" id="quiz-section" style="display:none">
  <img class="banner-img" src="Banner.png" alt="banner">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <span class="progress-label" id="q-num">1 / 7</span>
  </div>
  <p class="q-text" id="q-text"></p>
  <div class="choices" id="choices"></div>
  <div class="nav-row">
    <button class="back-btn" id="back-btn" onclick="goBack()">← ย้อนกลับ</button>
    <button class="next-btn" id="next-btn">ถัดไป</button>
  </div>
</div>

<!-- RESULT PAGE -->
<div class="result-page" id="result-section" style="display:none">
  <div class="result-inner" id="result-capture">
    <p class="r-label">DNA การเรียนรู้ของคุณคือ</p>
    <img class="r-img" id="r-img" src="" alt="">
    <p class="r-name" id="r-name"></p>
    <p class="r-eng" id="r-eng"></p>
    <div class="r-desc" id="r-desc"></div>
    <div class="r-traits" id="r-traits"></div>
  </div>
  <div class="result-btns" style="margin-top:1rem">
    <button class="retry-btn" onclick="restart()">ลองใหม่อีกครั้ง</button>
    <button class="save-btn" onclick="saveImage()">💾 เซฟรูปผลลัพธ์</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const questions = [
  { text: "เวลาได้รับ tool หรือ software ใหม่ สิ่งแรกที่คุณทำคืออะไร?", choices: [
    { text: "เปิดใช้งานเลย เจอปัญหาค่อยหาทางแก้", animal: "otter" },
    { text: "หา tutorial หรืออ่าน documentation ก่อน", animal: "tiger" },
    { text: "นั่งคิดก่อนว่าจะใช้มันทำอะไรได้บ้าง", animal: "owl" },
    { text: "ถามเพื่อนร่วมงานที่เคยใช้มาก่อน", animal: "dolphin" }
  ]},
  { text: "เวลาติดปัญหาในงาน คุณมักจะ…", choices: [
    { text: "ลองทำหลายๆ วิธีจน breakthrough", animal: "otter" },
    { text: "ค้นหาข้อมูลเองจนเจอคำตอบ", animal: "tiger" },
    { text: "ถอยออกมาคิด big picture ก่อน", animal: "owl" },
    { text: "ระดมสมองกับทีม", animal: "dolphin" }
  ]},
  { text: "Training format ไหนที่คุณ engage ที่สุด?", choices: [
    { text: "Workshop ที่ได้ลงมือทำ hands-on", animal: "otter" },
    { text: "Online course ที่เรียนได้ตามเวลาตัวเอง", animal: "tiger" },
    { text: "Case study ที่ได้วิเคราะห์เชิงลึก", animal: "owl" },
    { text: "Group discussion หรือ role play", animal: "dolphin" }
  ]},
  { text: "คุณรู้สึกว่าตัวเองเรียนรู้ได้ดีที่สุดเมื่อ…", choices: [
    { text: "ได้ทดลองทำจริงๆ แม้จะพลาดบ้าง", animal: "otter" },
    { text: "ได้อ่านหรือดูคนเดียวอย่างตั้งใจ", animal: "tiger" },
    { text: "ได้เชื่อมโยงกับสิ่งที่รู้อยู่แล้ว", animal: "owl" },
    { text: "ได้อธิบายหรือสอนคนอื่น", animal: "dolphin" }
  ]},
  { text: "หลัง training จบ คุณมักจะทำอะไร?", choices: [
    { text: "นำไปใช้กับงานจริงทันที", animal: "otter" },
    { text: "หาอ่านเพิ่มเติมในหัวข้อที่สนใจ", animal: "tiger" },
    { text: "สรุปหรือจดบันทึกไว้ให้ตัวเอง", animal: "owl" },
    { text: "แชร์ให้เพื่อนร่วมทีมฟัง", animal: "dolphin" }
  ]},
  { text: "เวลาได้รับ feedback คุณรู้สึกอย่างไร?", choices: [
    { text: "อยากรีบปรับและลองใหม่เลย", animal: "otter" },
    { text: "เอาไปคิดและหาข้อมูลเพิ่มเอง", animal: "tiger" },
    { text: "วิเคราะห์ว่า feedback นั้น valid แค่ไหน", animal: "owl" },
    { text: "คุยกับคนอื่นเพื่อขอมุมมองเพิ่ม", animal: "dolphin" }
  ]},
  { text: "ถ้าต้องเรียนรู้หัวข้อใหม่ใน 1 สัปดาห์ คุณจะวางแผนยังไง?", choices: [
    { text: "เริ่มทำ project เล็กๆ ไปพร้อมกับเรียน", animal: "otter" },
    { text: "กำหนดเวลาอ่านและทบทวนเองทุกวัน", animal: "tiger" },
    { text: "วางโครงก่อนว่าจะ cover อะไรบ้าง", animal: "owl" },
    { text: "หาคนที่รู้เรื่องนี้มาคุยด้วย", animal: "dolphin" }
  ]}
];

const results = {
  otter: {
    bg: "#FAF2FA",
    img: "https://RommaiK.github.io/learning-quiz/Otter.png",
    name: "🦦 The Otter",
    eng: "นักลงมือทำผู้กล้า... ยิ่งลองยิ่งเก่ง!",
    desc: "DNA ของคุณคือสายลุยตัวจริง! การเรียนรู้ของคุณไม่ใช่แค่การอ่านตำรา แต่คือการได้ลงมือหยิบจับและทำจริงให้เห็นกับตา คุณไม่เคยกังวลเลยถ้าจะทำผิดพลาด เพราะสำหรับคุณแล้ว ความผิดพลาดก็แค่บทเรียนสนุกๆ ที่ทำให้คุณเติบโตขึ้นไปอีกขั้น ยิ่งได้ลองผิดลองถูกมากเท่าไหร่ คุณก็ยิ่งฉายแววความเก่งออกมาได้ชัดเจนเท่านั้น... ลุยเลย! เพราะทุกประสบการณ์ที่คุณสร้างขึ้น คือก้าวที่สำคัญที่สุดในการพัฒนาตัวเองครับ",
    traits: ["Hands-on", "Adaptive", "Action-oriented", "ไม่กลัวลองผิดลองถูก"]
  },
  tiger: {
    bg: "#FAFFFA",
    img: "https://RommaiK.github.io/learning-quiz/Tiger.png",
    name: "🐅 The Tiger",
    eng: "นักเรียนรู้สายลุยเดี่ยว... ผู้ครองอาณาจักรแห่งความรู้!",
    desc: "DNA ของคุณคือความเท่ที่มาพร้อมกับพลัง! คุณเป็นคนที่มีไฟในการเรียนรู้แบบสุดๆ ไม่ต้องรอให้ใครมาบอกหรือรอใครมาสอน เพราะคุณนี่แหละคือคนที่ขับเคลื่อนการพัฒนาตัวเองได้ดีที่สุด คุณชอบเจาะลึกในสิ่งที่สนใจ จนกลายเป็นผู้เชี่ยวชาญในแบบฉบับของตัวเองได้เสมอ สิ่งที่เรียนรู้ด้วยมือคุณเองมักจะเป็นความรู้ที่แน่นและทรงพลังที่สุด... สานต่อไฟในตัวคุณต่อไปนะครับ เพราะโลกแห่งการเรียนรู้นี้ คุณคือคนที่กำหนดทิศทางเองได้ดีที่สุดเลย!",
    traits: ["Self-motivated", "Curious", "Deep learner", "Independent"]
  },
  owl: {
    bg: "#FAFFFF",
    img: "https://RommaiK.github.io/learning-quiz/Owl.png",
    name: "🦉 The Owl",
    eng: "นักคิดผู้รอบรู้... มองลึกถึงแก่น เข้าใจชัดถึงเหตุผล!",
    desc: "DNA ของคุณคือความลุ่มลึกที่น่าชื่นชมครับ! ก่อนที่จะเริ่มลงมือทำอะไร คุณมักจะมองหาคำตอบว่า 'ทำไม' เสมอ คุณเป็นนักเชื่อมโยงไอเดียที่มองภาพรวมได้ขาด และชอบใช้เวลาตกผลึกความคิดให้คมชัดที่สุด แม้การเรียนรู้ของคุณจะค่อยเป็นค่อยไป แต่เชื่อเถอะว่าทุกอย่างที่คุณได้รับมาจะฝังลึกและนำไปปรับใช้ได้แม่นยำกว่าใคร... เพราะความเข้าใจที่แท้จริงต้องใช้เวลา คุณคือคนประเภทที่ 'ช้าแต่ชัวร์' และผลลัพธ์ที่คุณทำมักจะออกมางดงามเสมอครับ!",
    traits: ["Analytical", "Systematic", "Big picture thinker", "Reflective"]
  },
  dolphin: {
    bg: "#F2FAFF",
    img: "https://RommaiK.github.io/learning-quiz/dophin.png",
    name: "🐬 The Dolphin",
    eng: "เพื่อนซี้สายความรู้... ยิ่งแชร์ยิ่งปัง!",
    desc: "DNA ของคุณคือ 'Social Learner' ตัวตึง! โลกการเรียนรู้ของคุณจะเหงาไม่ได้ ถ้าได้นั่งล้อมวงคุยงานหรือระดมไอเดียกับคุณปุ๊บ คือไอเดียบรรเจิดปั๊บ คุณเป็นเหมือนกาวใจที่ทำให้ทีมสนุกกับการเรียนรู้ ถ้าจะให้คุณเก่งขึ้นอีกนิด ก็แค่ลุยโปรเจกต์กลุ่มให้บ่อยขึ้น แล้วคุณจะพบว่าพลังของทีมมันเหนือชั้นแค่ไหน!",
    traits: ["Collaborative", "Communicative", "Empathetic", "Team player"]
  }
};

let current = 0, answers = [], selected = null;

function startQuiz() {
  document.getElementById("cover-section").style.display = "none";
  document.getElementById("quiz-section").style.display = "block";
  render();
}

function render() {
  const q = questions[current];
  document.getElementById("q-num").textContent = `${current + 1} / ${questions.length}`;
  document.getElementById("q-text").textContent = q.text;
  document.getElementById("progress").style.width = `${(current / questions.length) * 100}%`;
  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  selected = answers[current] || null;
  const backBtn = document.getElementById("back-btn");
  backBtn.disabled = current === 0;
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.toggle("active", selected !== null);
  q.choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn" + (c.animal === selected ? " selected" : "");
    btn.textContent = c.text;
    btn.onclick = () => {
      document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = c.animal;
      answers[current] = selected;
      nextBtn.classList.add("active");
    };
    choicesEl.appendChild(btn);
  });
  nextBtn.textContent = current === questions.length - 1 ? "ดูผลลัพธ์" : "ถัดไป";
  nextBtn.onclick = () => {
    if (!selected) return;
    answers[current] = selected;
    if (current < questions.length - 1) { current++; render(); }
    else showResult();
  };
}

function goBack() {
  if (current > 0) { current--; render(); }
}

function showResult() {
  const counts = { otter: 0, tiger: 0, owl: 0, dolphin: 0 };
  answers.forEach(a => counts[a]++);
  const winner = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[winner];
  document.getElementById("quiz-section").style.display = "none";
  const rs = document.getElementById("result-section");
  rs.style.display = "flex";
  rs.style.background = r.bg;
  document.getElementById("r-img").src = r.img;
  document.getElementById("r-img").alt = r.name;
  document.getElementById("r-name").textContent = r.name;
  document.getElementById("r-eng").textContent = r.eng;
  document.getElementById("r-desc").textContent = r.desc;
  const traitsEl = document.getElementById("r-traits");
  traitsEl.innerHTML = "";
  r.traits.forEach(t => {
    const span = document.createElement("span");
    span.className = "trait";
    span.textContent = t;
    traitsEl.appendChild(span);
  });
}

function restart() {
  current = 0; answers = []; selected = null;
  document.getElementById("result-section").style.display = "none";
  document.getElementById("cover-section").style.display = "block";
  document.body.style.background = "#fdfaf7";
}

function saveImage() {
  const el = document.getElementById("result-capture");
  html2canvas(el, { backgroundColor: document.getElementById("result-section").style.background, scale: 2 }).then(canvas => {
    const link = document.createElement("a");
    link.download = "my-learning-dna.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>
</body>
</html>
